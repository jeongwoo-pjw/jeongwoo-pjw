<svg width="750" height="400" viewBox="0 0 750 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Row 1 -->

  <!-- UX/UI Design — Purple -->
  <circle cx="125" cy="95" r="65" fill="#EEF0FF" stroke="#6C63FF" stroke-width="2.5"/>
  <text x="125" y="79"  text-anchor="middle" font-size="18" font-weight="900" fill="#6C63FF" letter-spacing="1">UX</text>
  <text x="125" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#4B47B0">UX/UI Design</text>
  <text x="125" y="116" text-anchor="middle" font-size="10" fill="#8B87D0">인터페이스 설계</text>

  <!-- Business Ops — Coral -->
  <circle cx="375" cy="95" r="65" fill="#FFF0F3" stroke="#FF6B8A" stroke-width="2.5"/>
  <text x="375" y="79"  text-anchor="middle" font-size="18" font-weight="900" fill="#FF6B8A" letter-spacing="1">BIZ</text>
  <text x="375" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#CC3355">Business Ops</text>
  <text x="375" y="116" text-anchor="middle" font-size="10" fill="#E07090">경영 전략 지원</text>

  <!-- HR & People — Teal -->
  <circle cx="625" cy="95" r="65" fill="#E8FFF9" stroke="#2DD4B4" stroke-width="2.5"/>
  <text x="625" y="79"  text-anchor="middle" font-size="18" font-weight="900" fill="#2DD4B4" letter-spacing="1">HR</text>
  <text x="625" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#0A9E85">HR &amp; People</text>
  <text x="625" y="116" text-anchor="middle" font-size="10" fill="#40BFA5">인사 전반 운영</text>

  <!-- Row 2 -->

  <!-- E-Commerce — Orange -->
  <circle cx="125" cy="305" r="65" fill="#FFF7EE" stroke="#FF9F43" stroke-width="2.5"/>
  <text x="125" y="289" text-anchor="middle" font-size="18" font-weight="900" fill="#FF9F43" letter-spacing="1">MD</text>
  <text x="125" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#CC7700">E-Commerce</text>
  <text x="125" y="326" text-anchor="middle" font-size="10" fill="#E09030">상품 기획 · CS</text>

  <!-- User Research — Blue -->
  <circle cx="375" cy="305" r="65" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2.5"/>
  <text x="375" y="289" text-anchor="middle" font-size="18" font-weight="900" fill="#60A5FA" letter-spacing="1">UXR</text>
  <text x="375" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">User Research</text>
  <text x="375" y="326" text-anchor="middle" font-size="10" fill="#5090DD">리서치 · 인사이트</text>

  <!-- Visual Design — Violet -->
  <circle cx="625" cy="305" r="65" fill="#F5F0FF" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="625" y="289" text-anchor="middle" font-size="18" font-weight="900" fill="#A78BFA" letter-spacing="1">VIS</text>
  <text x="625" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">Visual Design</text>
  <text x="625" y="326" text-anchor="middle" font-size="10" fill="#9070CC">시각 디자인</text>
</svg>
